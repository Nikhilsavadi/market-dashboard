<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#131722" />
    <title>Signal Desk</title>
    <style>
      body { margin: 0; background: #131722; color: #d1d4dc; font-family: Inter, sans-serif; }
      #root { min-height: 100vh; }
      #fallback {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; height: 100vh; gap: 12px;
        font-family: monospace; font-size: 13px; color: #787b86;
      }
      #js-error {
        display: none; position: fixed; bottom: 0; left: 0; right: 0;
        background: #f23645; color: #fff; padding: 12px 20px;
        font-family: monospace; font-size: 11px; z-index: 99999;
        white-space: pre-wrap; max-height: 200px; overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="fallback">
        <div style="font-size:28px">⏳</div>
        <div style="color:#2962ff; font-weight:700; font-size:14px">Signal Desk</div>
        <div>Loading JS bundle...</div>
        <div style="font-size:10px">If this persists, check console (F12)</div>
      </div>
    </div>
    <div id="js-error"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById("js-error");
        el.style.display = "block";
        el.textContent = "JS ERROR: " + msg + "\n" + (src||"") + ":" + line + ":" + col;
        console.error("Caught by window.onerror:", msg, src, line);
      };
      window.addEventListener("unhandledrejection", function(e) {
        var el = document.getElementById("js-error");
        el.style.display = "block";
        el.textContent = "UNHANDLED PROMISE: " + (e.reason?.message || String(e.reason));
      });
    </script>
  </body>
</html>
